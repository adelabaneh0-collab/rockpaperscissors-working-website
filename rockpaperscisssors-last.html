<!DOCTYPE html>
<html>
<head>
<title>rock,paper,scissors-lastpractice</title>
<style>
.body{background-color:rgb(104, 78, 78);}

.first-p-div{display:flex;vertical-align:center;justify-content:center;background-color:black;font-size:37px;font-style:bold;height:120px;color:white;padding:0px;margin-top:20px;}
.game-buttons-div{display:flex;vertical-align:center;justify-content:center;margin-top:200px;}
.reset-score-button-div{display:flex;justify-content:center;vertical-align:center;margin-top:20px;}
.second-p-div{justify-content:center;align-items:center;width:100%;padding:0px;margin:0px;}

.first-p{color:white;}
.second-p{display:flex;justify-content:center;vertical-align:center;margin-top:450px;background-color:yellow;font-size:30px;height:70px;}

.rock-button{height:90px;width:200px;margin:0px;padding:0px;border:none;background-color:red;color:white;;font-size:26px;transition:opacity 0.15s;}
.paper-button{height:90px;width:200px;margin:0px;padding:0px;border:none;background-color:blue;color:white;;font-size:26px;margin-right:10px;margin-left:10px;transition:opacity 0.15s;}
.scissors-button{height:90px;width:200px;margin:0px;padding:0px;border:none;background-color:pink;color:white;;font-size:26px;transition:opacity 0.15s;}
.reset-score-button{background-color:rgb(240, 39, 186);color:white;border:none;height:70px;width:250px;border-radius:40px;transition:opacity 0.15s;font-size:17px; }

.rock-button:hover{opacity:0.8;}
.rock-button:active{opacity:0.4;}

.paper-button:hover{opacity:0.8;}
.paper-button:active{opacity:0.4;}

.scissors-button:hover{opacity:0.8;}
.scissors-button:active{opacity:0.4;}

.reset-score-button:hover{opacity:0.8;}
.reset-score-button:active{opacity:0.4;}

</style>
</head>
<body class="body">


<div class="first-p-div">
<P class="first-p">rock paper scissors</P>
</div>

<div class="game-buttons-div">
<button class="rock-button" onclick=" mainFun('rock') ">rock</button>
<button class="paper-button" onclick=" mainFun('paper') ">paper</button>
<button class="scissors-button" onclick=" mainFun('scissors')">scissors</button>
</div>
<div class="reset-score-button-div"> <button class="reset-score-button" onclick="score.Wins=0;score.Losses=0;score.Ties=0 ">Reset The Score</button></div>

<div class="second-p-div">
<p class="second-p">you are playing against the computer</p>
</div>

<script>
let score =JSON.parse(localStorage.getItem('score'))
if (score === null) {score = {Wins:0,Losses:0,Ties:0}}

function mainFun (playerMove) {
const computerMove=secondFun();
let resault='';

if (playerMove === 'rock') {
  if (computerMove === 'rock') {resault = 'Tie'}
  else if (computerMove === 'paper') {resault = 'you lose'}
  else if (computerMove === 'scissors') {resault = 'you win'}
}
else if (playerMove === 'paper') {
  if (computerMove === 'paper') {resault = 'Tie'}
  else if (computerMove === 'scissors') {resault = 'you lose'}
  else if (computerMove === 'rock') {resault = 'you win'}
}
else if (playerMove === 'scissors') {
  if (computerMove === 'scissors') {resault = 'Tie'}
  else if (computerMove === 'rock') {resault = 'you lose'}
  else if (computerMove === 'paper') {resault = 'you win'}
  }
if (resault === 'Tie') {score.Ties +=1}
else if (resault === 'you lose') {score.Losses +=1}
else if (resault === 'you win') {score.Wins +=1}

localStorage.setItem('score',JSON.stringify(score))

alert(`you picked ${playerMove} ,computer picked ${computerMove} ,${resault}
wins ${score.Wins} ,losses${score.Losses} ,Ties ${score.Ties}.`)
}


function secondFun () {

const randomNumber=Math.random();
let computerMove='';
if (randomNumber >=0 && randomNumber <1/3) {computerMove = 'rock'}
else if (randomNumber >=1/3 && randomNumber <2/3) {computerMove = 'paper'}
else if (randomNumber >=2/3 && randomNumber <1) {computerMove = 'scissors'}

return computerMove;
}







</script>
</body>
</html>
